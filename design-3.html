<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seed of Sounds — Create Flow · Premium Video Loader</title>
<link rel="stylesheet" href="createflow.css">
<style>
  /* video loader (design 3 — premium portrait clips, contain) */
  .vhero { width: 300px; height: 300px; position: relative; }
  .vhero video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain;
    mix-blend-mode: screen; opacity: 0; transition: opacity .7s ease; transform-origin: 50% 46%;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 10%, #000 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0, #000 10%, #000 90%, transparent 100%); }
  .vhero video.on { opacity: 1; }
  /* clip finished → hold its last frame, but keep it alive with a slow breath (zoom + glow) */
  .vhero video.holding { animation: ambientBreath 4.6s ease-in-out infinite; }
  @keyframes ambientBreath {
    0%, 100% { transform: scale(1);     filter: brightness(1)    drop-shadow(0 0 6px rgba(245,143,34,.15)); }
    50%      { transform: scale(1.045);  filter: brightness(1.12) drop-shadow(0 0 18px rgba(245,143,34,.45)); }
  }
  .vhero .cap { position: absolute; left: 0; right: 0; bottom: -4px; text-align: center; font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; font-weight: 800; color: var(--accent-light); text-shadow: 0 0 12px rgba(245,143,34,.4); }
</style>
</head>
<body>
  <div class="pgt"><h1>Design 3</h1></div>
  <main>
    <section><div class="phone"><div class="screen" id="screen"></div></div></section>
  </main>

<script src="createflow.js"></script>
<script>
  function makeVideoLoader(srcs, fit, durs) {
    return {
      phaseDurations() { return (durs || [8, 8, 8]).map(d => d * 1000); },
      mount(stage) {
        const box = document.createElement('div'); box.className = 'vhero';
        // mỗi phase: 's' là chuỗi (1 clip) HOẶC [introSrc, loopSrc] = chơi hết intro rồi mới loop clip sau
        box.innerHTML = srcs.map((s, k) => {
          const intro = Array.isArray(s) ? s[0] : s;
          const loopSrc = Array.isArray(s) ? s[1] : '';
          const selfLoop = !Array.isArray(s) && /loop_|video4_2/.test(s);
          return `<video class="layer" data-k="${k}" src="${intro}" muted playsinline preload="auto"${selfLoop ? ' loop' : ''}${loopSrc ? ` data-loopsrc="${loopSrc}"` : ''} style="object-fit:${fit}"></video>`;
        }).join('') + '<div class="cap" id="vcap"></div>';
        stage.appendChild(box);
        this._box = box; this.vids = [...box.querySelectorAll('video')];
        // clip hết: nếu có data-loopsrc -> đổi sang clip loop và lặp; nếu không -> giữ frame cuối (hold)
        this.vids.forEach(v => v.addEventListener('ended', () => {
          if (!v.classList.contains('on') || v.loop) return;
          if (v.dataset.loopsrc) { v.src = v.dataset.loopsrc; v.loop = true; v.play().catch(() => {}); }
          else v.classList.add('holding');
        }));
        this.setPhase(0);
      },
      setPhase(i) {
        if (!this.vids) return;
        this.vids.forEach((v, k) => {
          if (k === i) { v.classList.remove('holding'); try { v.currentTime = 0; } catch (e) {} v.play().catch(() => {}); v.classList.add('on'); }
          else { v.classList.remove('on'); v.classList.remove('holding'); v.pause(); }
        });
        const cap = ['Charging the seed', 'Growing the melody', 'Dropping the track'][i];
        if (this._box) this._box.querySelector('#vcap').textContent = cap;
      },
      teardown() { if (this._box) this._box.remove(); this._box = null; this.vids = null; }
    };
  }

  const loader = makeVideoLoader([
    'assets/video4_2_seamless.mp4',
    ['assets/video5.mp4', 'assets/video5_loop_boomerang.mp4'],   // chơi hết video5 (biến hình) rồi mới loop đoạn 7.5→10
    'assets/veo/video6_zoom_drip.mp4',                           // zoom vào lá + đọng giọt + rơi (chơi 1 lần + hold; loop để video7 sau)
  ], 'contain', [20, 20, 14]);
  CreateFlow.init({ screen: '#screen', loader });
</script>
</body>
</html>
