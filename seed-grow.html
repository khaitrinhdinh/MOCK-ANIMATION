<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seed → Plant — Growth Flipbook</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: radial-gradient(760px 520px at 50% 32%, #15130c, #08080a 72%); color: #ededf5;
    font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    min-height: 100vh; display: grid; place-items: center; gap: 1rem; padding: 2rem; }
  h1 { font-size: 1.05rem; font-weight: 800; color: #FFBB57; letter-spacing: .02em; }
  p  { font-size: .82rem; color: rgba(237,237,245,.55); max-width: 46ch; text-align: center; }
  .stage { position: relative; width: 340px; height: 460px; border-radius: 22px; overflow: hidden;
    background: linear-gradient(180deg, #0b0b10 0%, #0e0c09 100%);
    border: 1px solid rgba(255,255,255,.08); box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .phase { position: absolute; left: 0; right: 0; bottom: 22px; text-align: center;
    font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; font-weight: 700;
    color: rgba(255,187,87,.85); text-shadow: 0 0 12px rgba(245,143,34,.4);
    transition: opacity .5s; }
  .bar { position: absolute; left: 26px; right: 26px; bottom: 12px; height: 2px;
    border-radius: 2px; background: rgba(255,255,255,.1); overflow: hidden; }
  .bar > i { position: absolute; inset: 0; width: 0%; background: linear-gradient(90deg,#F58F22,#FFBB57);
    box-shadow: 0 0 8px rgba(245,143,34,.7); }
</style>
</head>
<body>
  <h1>🌱 Seed of Sounds — growth</h1>
  <div class="stage">
    <canvas id="c"></canvas>
    <div class="phase" id="ph">Analyze &amp; Nurture</div>
    <div class="bar"><i id="pb"></i></div>
  </div>
  <p>A single coffee seed sprouts, roots, and grows into a mature plant — a 50-frame flipbook cut live from the growth sheet, bottom-anchored to the soil with rising light motes and a soft sway.</p>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
(function () {
  // [x, y, w, h] per frame (soil at y+h), auto-cut from the growth sheet (5 stages x 10 frames)
  const F = [[130,0,132,163],[262,0,141,163],[403,0,140,163],[543,0,141,163],[684,0,140,163],[824,0,141,163],[965,0,140,163],[1105,0,141,163],[1246,0,140,163],[1386,0,140,163],[130,186,132,171],[262,186,141,171],[403,186,140,171],[543,186,141,171],[684,186,140,171],[824,186,141,171],[965,186,140,171],[1105,186,141,171],[1246,186,140,171],[1386,186,140,171],[130,380,132,176],[262,380,141,176],[403,380,140,176],[543,380,141,176],[684,380,140,176],[824,380,141,176],[965,380,140,176],[1105,380,141,176],[1246,380,140,176],[1386,380,140,176],[130,578,132,178],[262,578,141,178],[403,578,140,178],[543,578,141,178],[684,578,140,178],[824,578,141,178],[965,578,140,178],[1105,578,141,178],[1246,578,140,178],[1386,578,140,178],[130,778,132,202],[262,778,141,202],[403,778,140,202],[543,778,141,202],[684,778,140,202],[824,778,141,202],[965,778,140,202],[1105,778,141,202],[1246,778,140,202],[1386,778,140,202]];
  const N = F.length;

  const stage = document.querySelector('.stage');
  const cv = document.getElementById('c');
  const ph = document.getElementById('ph'), pb = document.getElementById('pb');
  const W = 340, H = 460, DPR = Math.min(devicePixelRatio || 1, 2);
  cv.width = W * DPR; cv.height = H * DPR;
  const ctx = cv.getContext('2d'); ctx.scale(DPR, DPR);

  const CX = W / 2, BASE = 402;      // soil baseline on screen
  const S = 1.62;                    // frame -> screen scale
  const state = { p: 0 };            // growth progress 0..1
  const motes = [];

  const img = new Image();
  img.onload = () => { gsap.ticker.add(draw); play(); };
  img.src = 'assets/plant_sheet.png';

  function frameAt(p) {
    const f = Math.min(N - 1, Math.max(0, Math.floor(p * (N - 1))));
    return f;
  }

  function draw() {
    const t = performance.now() / 1000;
    ctx.clearRect(0, 0, W, H);

    // soft ground glow — brightens as the plant establishes
    const gg = ctx.createRadialGradient(CX, BASE, 6, CX, BASE, 120);
    const gi = 0.10 + state.p * 0.22;
    gg.addColorStop(0, `rgba(245,170,60,${gi})`);
    gg.addColorStop(1, 'rgba(245,143,34,0)');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.ellipse(CX, BASE, 120, 34, 0, 0, 7); ctx.fill();

    // the plant frame, bottom-anchored, gentle sway that grows with the plant
    const f = frameAt(state.p), b = F[f];
    const dw = b[2] * S, dh = b[3] * S;
    const sway = Math.sin(t * 1.1) * (0.010 + state.p * 0.028);
    ctx.save();
    ctx.translate(CX, BASE);
    ctx.rotate(sway);
    ctx.drawImage(img, b[0], b[1], b[2], b[3], -dw / 2, -dh, dw, dh);
    ctx.restore();

    // rising light motes (life energy)
    ctx.globalCompositeOperation = 'lighter';
    for (const m of motes) {
      m.y -= m.vy; m.x += Math.sin((t + m.seed) * 1.6) * 0.25; m.life -= 0.006;
      if (m.life <= 0 || m.y < 70) { reseed(m); }
      const a = Math.max(0, Math.min(1, m.life)) * m.a;
      ctx.fillStyle = `rgba(255,${180 + (m.warm|0)},90,${a})`;
      ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, 7); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    pb.style.width = (state.p * 100).toFixed(1) + '%';
  }

  function reseed(m) {
    m.x = CX + (Math.random() * 90 - 45);
    m.y = BASE - Math.random() * 20;
    m.vy = 0.25 + Math.random() * 0.7;
    m.r = 0.7 + Math.random() * 1.8;
    m.a = 0.35 + Math.random() * 0.5;
    m.life = 0.6 + Math.random() * 0.8;
    m.seed = Math.random() * 10;
    m.warm = Math.random() * 40;
  }
  for (let i = 0; i < 22; i++) { const m = {}; reseed(m); m.y = BASE - Math.random() * 300; motes.push(m); }

  function setPhase(txt) { if (ph.textContent !== txt) { ph.style.opacity = 0;
    setTimeout(() => { ph.textContent = txt; ph.style.opacity = 1; }, 220); } }

  function play() {
    state.p = 0; ph.textContent = 'Analyze & Nurture'; ph.style.opacity = 1;
    gsap.timeline({ onComplete: () => gsap.delayedCall(1.4, play) })
      // linger on the seed (idle breathing)
      .to(state, { p: 0.20, duration: 1.6, ease: 'sine.inOut' })
      .add(() => setPhase('Create & Grow'))
      // sprout + seedling — the lively middle
      .to(state, { p: 0.62, duration: 2.6, ease: 'power1.inOut' })
      .add(() => setPhase('Arrange & Drop'))
      // young → mature, settling in
      .to(state, { p: 1.0, duration: 2.4, ease: 'power2.out' })
      // hold on the full-grown plant, swaying
      .to({}, { duration: 1.6 });
  }
})();
</script>
</body>
</html>
