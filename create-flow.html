<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>1Pro Studio — Create Flow (current design)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="phone app-shell">
  <div class="app-ambient"></div>
  <div class="main">
    <div class="chat-panel">
      <!-- Step dots -->
      <div class="step-dots" id="stepDots"></div>
      <!-- Scroll body -->
      <div class="scroll-body scrollbar-hide">
        <div id="chatHistory"></div>
        <div class="options-area" id="optionsArea"></div>
      </div>
    </div>
  </div>

  <!-- Demo-only step switcher -->
  <div class="demo-bar" id="demoBar"></div>
</div>

<!-- ============ TEMPLATES ============ -->

<!-- SEED (theme → genre → seed) -->
<template id="tpl-seed">
  <p class="section-label">Theme</p>
  <div class="h-scroll" id="themeScroll"></div>

  <div id="genreStage" class="hidden" style="margin-top:16px">
    <p class="section-label">Genre</p>
    <div class="pill-row" id="genreRow"></div>
  </div>

  <div id="seedStage" class="hidden" style="margin-top:16px">
    <div class="h-scroll" id="seedScroll"></div>
  </div>
</template>

<!-- IMAGE -->
<template id="tpl-image">
  <div class="upload-zone">
    <div class="circle">📷</div>
    <div class="t1">Upload a photo</div>
    <div class="t2">JPG, PNG up to 10MB</div>
  </div>
</template>

<!-- MOOD -->
<template id="tpl-mood">
  <div class="h-scroll" id="moodScroll"></div>
</template>

<!-- VOCAL -->
<template id="tpl-vocal">
  <div class="h-scroll" id="vocalScroll"></div>
</template>

<!-- TEXT -->
<template id="tpl-text">
  <div class="chat-text-input">
    <textarea class="chat-textarea" placeholder="Type your feelings, a memory, or keywords…"></textarea>
    <div class="char-count">0/500</div>
  </div>
  <div class="tips-box">
    <div class="tips-head"><span class="ico">🎤</span><span class="t">💡 Tips:</span></div>
    <div class="tip"><span class="dot"></span><p>Describe your feelings or current mood</p></div>
    <div class="tip"><span class="dot"></span><p>Share a memory or story</p></div>
    <div class="tip"><span class="dot"></span><p>Add keywords or phrases you'd like in the lyrics</p></div>
    <div class="tip"><span class="dot"></span><p>Or leave it empty for AI to be creative!</p></div>
  </div>
</template>

<!-- CONFIRM -->
<template id="tpl-confirm">
  <p class="section-label" style="margin-bottom:12px">Summary</p>
  <div class="summary-card">
    <div class="summary-row">
      <div class="summary-thumb" style="background:linear-gradient(135deg,#F58F22,#7c3aed)"></div>
      <div><div class="summary-label">Style</div><div class="summary-val">Summer Festival 2025 · Pop</div></div>
    </div>
    <div class="summary-grid">
      <div><div class="summary-label">Mood</div><div class="summary-val">😢 Emotional</div></div>
      <div><div class="summary-label">Vocal</div><div class="summary-val">Female Vocal</div></div>
    </div>
  </div>
</template>

<!-- PROCESSING -->
<template id="tpl-processing">
  <div class="processing-screen">
    <div class="processing-orb">🎵</div>
    <h2 style="font-size:19px;font-weight:700;margin-bottom:8px">Creating Your Song</h2>
    <div class="progress-track"><div class="progress-fill" style="width:45%"></div></div>
    <div class="proc-stepper">
      <div class="proc-dot done">✓</div>
      <div class="proc-dot active">•</div>
      <div class="proc-dot">3</div>
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--accent-light);margin-bottom:20px">Generating lyrics…</div>
    <button class="nav-btn" style="width:auto;background:var(--bg-card);color:#fff;box-shadow:none;border:1px solid var(--border-md);margin-top:0">Close &amp; Wait for Notification</button>
  </div>
</template>

<script src="createflow.js"></script>
</body>
</html>
