<style>
  /* variant picker */
  .picker-body { flex: 1; overflow-y: auto; padding: 24px 18px; display: flex; flex-direction: column; }
  .picker-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
  .picker-sub { font-size: 12.5px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
  .picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .pick-card { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 22px 10px; border-radius: 16px;
    border: 1px solid var(--border-md); background: var(--bg-card); cursor: pointer; transition: all .15s; font-family: inherit; color: var(--text-primary); }
  .pick-card:hover { border-color: var(--accent); background: var(--accent-surface); transform: translateY(-2px); }
  .pick-emo { font-size: 2rem; }
  .pick-nm { font-size: 14px; font-weight: 700; }
  .pick-ds { font-size: 10.5px; color: var(--text-muted); text-align: center; }

  /* ── original hand-drawn Music Seed animation (all 4 variants share these) ── */
  .d1stage { width: 268px; }
  .d1stage svg { display: block; width: 100%; height: auto; overflow: visible; }
  .d1stage .scene { display: block; }
  .particles, .rays { opacity: 0; transition: opacity .5s; }
  .ph1 .particles, .ph1 .rays { opacity: 1; }
  .ph2 .particles, .ph2 .rays { opacity: 0; }
  .pt { animation: fall var(--t,2.4s) linear var(--d,0s) infinite; }
  @keyframes fall { 0%{transform:translateY(0);opacity:0} 12%{opacity:1} 78%{opacity:.9} 100%{transform:translateY(185px);opacity:0} }
  .ray { animation: rayPulse 1.8s ease-in-out var(--d,0s) infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes rayPulse { 0%,100%{opacity:.15} 50%{opacity:.8} }
  .seed-body { transform-box: fill-box; transform-origin: center; }
  .ph1 .seed-body { animation: seedPulse 1.6s ease-in-out infinite; }
  .ph3 .seed-body, .done .seed-body { animation: none; }
  @keyframes seedPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
  .root { stroke-dasharray: 40; stroke-dashoffset: 40; }
  .ph1 .root { animation: draw 1.4s ease-out var(--d,0s) forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  .fireflies { opacity: 0; transition: opacity .5s; }
  .ph1 .fireflies { opacity: 1; }
  .ph3 .fireflies { opacity: 0; }
  .ff { animation: ffDrift var(--t,3.2s) ease-in-out var(--d,0s) infinite alternate; filter: drop-shadow(0 0 3px #ffd75e); }
  @keyframes ffDrift { 0%{transform:translate(0,0);opacity:.15} 40%{opacity:1} 100%{transform:translate(var(--dx,12px),var(--dy,-8px));opacity:.3} }
  .stem { stroke-dasharray: 96; stroke-dashoffset: 96; }
  .ph2 .stem { animation: draw 1.1s ease-in-out var(--sd,.1s) forwards; }
  .leaf-in { transform: scale(0); transform-box: fill-box; transform-origin: 100% 100%; }
  .ph2 .leaf-in { animation: leafIn .65s cubic-bezier(.34,1.56,.64,1) var(--d,.8s) forwards; }
  @keyframes leafIn { to { transform: scale(1); } }
  .pop2, .pop3 { transform: scale(0); transform-box: fill-box; transform-origin: var(--o, center); }
  .ph2 .pop2 { animation: leafIn .6s cubic-bezier(.34,1.56,.64,1) var(--d,0s) forwards; }
  .ph3 .pop3 { animation: leafIn .55s cubic-bezier(.34,1.56,.64,1) var(--d,0s) forwards; }
  .notes { opacity: 0; transition: opacity .5s; }
  .ph2 .notes { opacity: 1; }
  .ph3 .notes { opacity: 0; }
  .note-g { animation: floatNote 2.6s ease-in-out var(--d,0s) infinite; }
  @keyframes floatNote { 0%,100%{transform:translateY(0);opacity:.35} 50%{transform:translateY(-12px);opacity:1} }
  .petal-e { transform: scale(0); transform-box: fill-box; transform-origin: 50% 100%; }
  .ph3 .petal-e { animation: leafIn .55s cubic-bezier(.34,1.56,.64,1) var(--d,0s) forwards; }
  .fcenter { transform: scale(0); transform-box: fill-box; transform-origin: center; }
  .ph3 .fcenter { animation: leafIn .5s cubic-bezier(.34,1.56,.64,1) .5s forwards; }
  .sparkles { opacity: 0; }
  .ph3 .sparkles { opacity: 1; }
  .spark, .star { animation: twinkle 1.8s ease-in-out var(--d,0s) infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes twinkle { 0%,100%{opacity:.1;transform:scale(.6)} 50%{opacity:1;transform:scale(1)} }
  .drop { opacity: 0; }
  .done .drop { animation: dropFall 1.7s cubic-bezier(.5,0,.8,.4) .3s forwards; }
  @keyframes dropFall { 0%{opacity:0;transform:translateY(0) scale(.3)} 20%{opacity:1;transform:translateY(4px) scale(1)} 85%{opacity:1} 100%{opacity:0;transform:translateY(118px) scale(.9)} }
  .ripple { opacity: 0; transform-box: fill-box; transform-origin: center; }
  .done .ripple { animation: rippleOut 1.8s ease-out var(--d,1.7s) infinite; }
  @keyframes rippleOut { 0%{opacity:.8;transform:scale(.2)} 100%{opacity:0;transform:scale(1.6)} }
  .scene[data-scene="firefly"] .seed-body { filter: drop-shadow(0 0 5px rgba(255,215,94,.8)); }
  .scene[data-scene="firefly"] .drop, .scene[data-scene="firefly"] .fcenter { filter: drop-shadow(0 0 6px rgba(255,215,94,.7)); }
</style>

  const VARIANTS = [
    ['classic', '🌼', 'Classic', 'Seed → flower → drop'],
    ['raindrop', '🌧️', 'Raindrop', 'Rain feeds the seed'],
    ['firefly', '✨', 'Firefly', 'Glows in the night'],
    ['bonsai', '🌳', 'Bonsai', 'Grows a golden fruit'],
  ];
  let currentVariant = 'classic';

  const drawn = (variant) => ({
    mount(stage) { const box = document.createElement('div'); box.className = 'd1stage stage'; box.innerHTML = SCENES[variant]; stage.appendChild(box); this._box = box; },
    setPhase(i) { if (!this._box) return; this._box.classList.add('ph1'); if (i >= 1) this._box.classList.add('ph2'); if (i >= 2) this._box.classList.add('ph3'); },
    done() { if (this._box) this._box.classList.add('ph1', 'ph2', 'ph3', 'done'); },
    teardown() { if (this._box) this._box.remove(); this._box = null; }
  });

  const screenEl = document.querySelector('#screen');
  function renderPicker() {
    screenEl.innerHTML = '';
    screenEl.insertAdjacentHTML('beforeend',
      '<div class="statusbar"><span>9:41</span><span class="ic"><span class="sig"><i></i><i></i><i></i><i></i></span>5G<span class="bat"><i></i></span></span></div>');
    const body = document.createElement('div'); body.className = 'picker-body';
    body.innerHTML = '<div class="picker-title">Choose your loading style</div><div class="picker-sub">Pick the hand-drawn animation that plays while your song is created.</div>';
    const grid = document.createElement('div'); grid.className = 'picker-grid';
    VARIANTS.forEach(([id, emo, nm, ds]) => {
      const c = document.createElement('button'); c.className = 'pick-card';
      c.innerHTML = '<span class="pick-emo">' + emo + '</span><span class="pick-nm">' + nm + '</span><span class="pick-ds">' + ds + '</span>';
      c.onclick = () => startFlow(id);
      grid.appendChild(c);
    });
    body.appendChild(grid); screenEl.appendChild(body);
  }
  function startFlow(variant) { currentVariant = variant; CreateFlow.init({ screen: '#screen', loader: drawn(variant), drama: true }); }

  renderPicker();
</script>
