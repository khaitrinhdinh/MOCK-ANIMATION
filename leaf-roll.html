<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dew Leaf — Drop Rolls & Drips</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: radial-gradient(760px 520px at 50% 34%, #14140d, #08080a 72%); color: #ededf5;
    font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    min-height: 100vh; display: grid; place-items: center; gap: 1rem; padding: 2rem; }
  h1 { font-size: 1.05rem; font-weight: 800; color: #FFBB57; letter-spacing: .02em; }
  p  { font-size: .82rem; color: rgba(237,237,245,.55); max-width: 46ch; text-align: center; }
  .stage { position: relative; width: 340px; height: 460px; border-radius: 22px; overflow: hidden;
    background: linear-gradient(180deg, #0b0d0a 0%, #0a0a09 100%);
    border: 1px solid rgba(255,255,255,.08); box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .phase { position: absolute; left: 0; right: 0; bottom: 22px; text-align: center;
    font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; font-weight: 700;
    color: rgba(255,187,87,.85); text-shadow: 0 0 12px rgba(245,143,34,.4); }
</style>
</head>
<body>
  <h1>🍃 Dew drop rolls down the leaf</h1>
  <div class="stage">
    <canvas id="c"></canvas>
    <div class="phase">Analyze &amp; Nurture</div>
  </div>
  <p>A single 17-frame leaf sequence: the dew drop rolls down the blade, the tip droops under its weight, and the drop finally drips off. Straight from the leaf frames — the drop is part of the artwork, nothing added.</p>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
(function () {
  const W = 340, H = 460, DPR = Math.min(devicePixelRatio || 1, 2);
  const cv = document.getElementById('c');
  cv.width = W * DPR; cv.height = H * DPR;
  const ctx = cv.getContext('2d'); ctx.scale(DPR, DPR);

  const FN = 17, CW = 300, CH = 250;                 // 17 frames in one strip
  const S = 1.04, DX = (W - CW * S) / 2, DY = 92;    // placement on stage
  const CXg = W / 2, CYg = DY + CH * S * 0.5;         // glow centre

  const strip = new Image();
  const st = { f: 0 };
  const motes = [];
  for (let i = 0; i < 16; i++) motes.push(reseed({}, true));
  function reseed(m, init) { m.x = 40 + Math.random() * 260; m.y = init ? Math.random() * H : H + 10;
    m.vy = 0.2 + Math.random() * 0.5; m.r = 0.6 + Math.random() * 1.6; m.a = 0.2 + Math.random() * 0.4;
    m.s = Math.random() * 10; return m; }

  function draw() {
    const t = performance.now() / 1000;
    ctx.clearRect(0, 0, W, H);
    // subsurface glow
    const gg = ctx.createRadialGradient(CXg, CYg, 20, CXg, CYg, 180);
    gg.addColorStop(0, 'rgba(180,200,40,0.10)'); gg.addColorStop(1, 'rgba(120,150,20,0)');
    ctx.fillStyle = gg; ctx.fillRect(0, 0, W, H);
    // the leaf frame
    const fi = Math.min(FN - 1, Math.max(0, Math.round(st.f)));
    ctx.drawImage(strip, fi * CW, 0, CW, CH, DX, DY, CW * S, CH * S);
    // ambient motes
    ctx.globalCompositeOperation = 'lighter';
    for (const m of motes) { m.y -= m.vy; m.x += Math.sin((t + m.s) * 1.5) * 0.2;
      if (m.y < 40) reseed(m, false);
      ctx.fillStyle = `rgba(255,205,110,${m.a})`; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, 7); ctx.fill(); }
    ctx.globalCompositeOperation = 'source-over';
  }

  function play() {
    st.f = 0;
    gsap.timeline({ onComplete: () => gsap.delayedCall(0.6, play) })
      .to(st, { f: 7, duration: 2.6, ease: 'power1.inOut' })   // roll down the blade
      .to(st, { f: 16, duration: 2.2, ease: 'power2.in' })     // droop + drip off
      .to({}, { duration: 0.7 });                              // beat before the loop
  }
  strip.onload = () => { gsap.ticker.add(draw); play(); };
  strip.src = 'assets/leaf_drop.png';
})();
</script>
</body>
</html>
