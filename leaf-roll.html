<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dew Drop — Roll Down the Leaf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: radial-gradient(760px 520px at 50% 34%, #14140d, #08080a 72%); color: #ededf5;
    font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    min-height: 100vh; display: grid; place-items: center; gap: 1rem; padding: 2rem; }
  h1 { font-size: 1.05rem; font-weight: 800; color: #FFBB57; letter-spacing: .02em; }
  p  { font-size: .82rem; color: rgba(237,237,245,.55); max-width: 46ch; text-align: center; }
  .stage { position: relative; width: 340px; height: 460px; border-radius: 22px; overflow: hidden;
    background: linear-gradient(180deg, #0b0d0a 0%, #0a0a09 100%);
    border: 1px solid rgba(255,255,255,.08); box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .phase { position: absolute; left: 0; right: 0; bottom: 22px; text-align: center;
    font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; font-weight: 700;
    color: rgba(255,187,87,.85); text-shadow: 0 0 12px rgba(245,143,34,.4); }
</style>
</head>
<body>
  <h1>💧 Dew drop rolls down the leaf</h1>
  <div class="stage">
    <canvas id="c"></canvas>
    <div class="phase">Analyze &amp; Nurture</div>
  </div>
  <p>A golden dew drop forms near the base, rolls down the leaf's central vein squashing with speed, hangs and stretches at the tip, then detaches and drips into a spreading ripple. Leaf + drop + ripple are keyed live from the Stage-6 asset pack.</p>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
(function () {
  const W = 340, H = 460, DPR = Math.min(devicePixelRatio || 1, 2);
  const cv = document.getElementById('c');
  cv.width = W * DPR; cv.height = H * DPR;
  const ctx = cv.getContext('2d'); ctx.scale(DPR, DPR);

  // leaf placement
  const LSC = 2.0, LW0 = 140, LH0 = 132;
  const LW = LW0 * LSC, LH = LH0 * LSC;
  const LX = 175 - LW / 2, LY = 205 - LH / 2;         // top-left of leaf draw
  // drop roll path down the central vein (tip at top-right -> base at lower-left), stage coords
  const CP = [{x:262,y:104},{x:214,y:166},{x:174,y:214},{x:134,y:256}];
  const TIP = CP[3];
  const LAND = { x: 134, y: 404 };                    // where the fallen drop lands
  function bez(t) { const u = 1 - t;
    const a = u*u*u, b = 3*u*u*t, c = 3*u*t*t, d = t*t*t;
    return { x: a*CP[0].x + b*CP[1].x + c*CP[2].x + d*CP[3].x,
             y: a*CP[0].y + b*CP[1].y + c*CP[2].y + d*CP[3].y }; }

  const imgs = {}; let loaded = 0; const names = ['leaf_hero','drop','drop_stretch','ripple_gold'];
  names.forEach(n => { const im = new Image(); im.onload = () => { if (++loaded === names.length) start(); };
    im.src = 'assets/' + n + '.png'; imgs[n] = im; });

  const st = { p: 0, dropA: 0, grow: 0.5, stretch: 0, fallY: 0, fallA: 0, rip: 0, ripA: 0 };
  const trail = [], beads = [], motes = [];
  for (let i = 0; i < 16; i++) motes.push(reseed({}, true));

  function reseed(m, init) { m.x = 40 + Math.random() * 260; m.y = init ? Math.random() * H : H + 10;
    m.vy = 0.2 + Math.random() * 0.5; m.r = 0.6 + Math.random() * 1.6; m.a = 0.2 + Math.random() * 0.4;
    m.s = Math.random() * 10; return m; }

  function draw() {
    const t = performance.now() / 1000;
    ctx.clearRect(0, 0, W, H);

    // subsurface glow behind the leaf
    const gg = ctx.createRadialGradient(175, 205, 20, 175, 205, 170);
    gg.addColorStop(0, 'rgba(180,200,40,0.10)'); gg.addColorStop(1, 'rgba(120,150,20,0)');
    ctx.fillStyle = gg; ctx.fillRect(0, 0, W, H);

    // leaf, gentle sway
    const sway = Math.sin(t * 0.7) * 0.012;
    ctx.save(); ctx.translate(175, 205); ctx.rotate(sway);
    ctx.drawImage(imgs.leaf_hero, -LW / 2, -LH / 2, LW, LH);
    ctx.restore();

    // wet trail behind the drop
    ctx.globalCompositeOperation = 'lighter';
    for (let i = trail.length - 1; i >= 0; i--) { const w = trail[i]; w.life -= 0.02;
      if (w.life <= 0) { trail.splice(i, 1); continue; }
      ctx.fillStyle = `rgba(210,225,150,${w.life * 0.12})`;
      ctx.beginPath(); ctx.arc(w.x, w.y, w.r, 0, 7); ctx.fill(); }
    ctx.globalCompositeOperation = 'source-over';

    // the rolling drop
    if (st.dropA > 0) {
      const pos = bez(st.p);
      const pos2 = bez(Math.min(1, st.p + 0.01));
      const ang = Math.atan2(pos2.y - pos.y, pos2.x - pos.x);
      const speed = Math.hypot(pos2.x - pos.x, pos2.y - pos.y);
      const sq = 1 + Math.min(0.28, speed * 4);           // stretch along motion
      const d = imgs.drop, dw = d.width * st.grow, dh = d.height * st.grow;
      ctx.save(); ctx.translate(pos.x, pos.y); ctx.globalAlpha = st.dropA;
      // soft contact glow
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(255,220,120,0.18)';
      ctx.beginPath(); ctx.arc(0, 0, dw * 0.7, 0, 7); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.rotate(ang + Math.PI / 2);                       // drop's long axis along path
      ctx.drawImage(d, -dw / 2, -dh * sq / 2, dw, dh * sq);
      ctx.restore(); ctx.globalAlpha = 1;
    }

    // hanging stretch + fall at the tip
    if (st.stretch > 0 || st.fallA > 0) {
      const s = imgs.drop_stretch;
      const g = st.grow * 1.5; const sw = s.width * g, sh = s.height * g * (1 + st.stretch);
      ctx.save(); ctx.globalAlpha = st.fallA > 0 ? st.fallA : 1;
      ctx.translate(TIP.x, TIP.y + st.fallY);
      ctx.drawImage(s, -sw / 2, -sh * 0.15, sw, sh);
      ctx.restore(); ctx.globalAlpha = 1;
    }

    // ripple + beads where it lands
    if (st.ripA > 0) {
      const rp = imgs.ripple_gold; const rw = rp.width * (0.5 + st.rip * 1.6), rh = rw * rp.height / rp.width;
      ctx.save(); ctx.globalAlpha = st.ripA; ctx.globalCompositeOperation = 'lighter';
      ctx.drawImage(rp, LAND.x - rw / 2, LAND.y - rh / 2, rw, rh);
      ctx.restore(); ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
    }
    ctx.globalCompositeOperation = 'lighter';
    for (let i = beads.length - 1; i >= 0; i--) { const b = beads[i]; b.vy += 0.5; b.x += b.vx; b.y += b.vy; b.life -= 0.03;
      if (b.life <= 0) { beads.splice(i, 1); continue; }
      ctx.fillStyle = `rgba(255,225,140,${Math.min(1, b.life * 2) * 0.9})`;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill(); }
    // motes
    for (const m of motes) { m.y -= m.vy; m.x += Math.sin((t + m.s) * 1.5) * 0.2;
      if (m.y < 40) reseed(m, false);
      ctx.fillStyle = `rgba(255,205,110,${m.a})`; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, 7); ctx.fill(); }
    ctx.globalCompositeOperation = 'source-over';

    // record trail while rolling
    if (st.dropA > 0.6 && st.p < 0.99) { const pos = bez(st.p);
      trail.push({ x: pos.x, y: pos.y, r: imgs.drop.width * st.grow * 0.32, life: 1 }); }
  }

  function splash() { for (let i = 0; i < 10; i++) { const an = -Math.PI/2 + (Math.random()-.5)*1.8, v = 2 + Math.random()*4;
    beads.push({ x: LAND.x, y: LAND.y, vx: Math.cos(an)*v, vy: Math.sin(an)*v - 1, r: 1 + Math.random()*2, life: .6 + Math.random()*.5 }); } }

  function play() {
    Object.assign(st, { p: 0, dropA: 0, grow: 0.5, stretch: 0, fallY: 0, fallA: 0, rip: 0, ripA: 0 });
    trail.length = 0; beads.length = 0;
    gsap.timeline({ onComplete: () => gsap.delayedCall(0.9, play) })
      // 1) form near the base
      .to(st, { dropA: 1, grow: 0.72, duration: 0.7, ease: 'power2.out' })
      .to(st, { duration: 0.4 })
      // 2) roll down the vein, growing as it gathers
      .to(st, { p: 1, duration: 2.6, ease: 'power1.in' })
      .to(st, { grow: 1.05, duration: 2.6, ease: 'power1.in' }, '<')
      // 3) hang at the tip, hide roller, show stretch
      .set(st, { dropA: 0 })
      .to(st, { stretch: 0.9, duration: 0.6, ease: 'power2.in' })
      // 4) detach & fall
      .to(st, { fallA: 1, duration: 0.01 })
      .to(st, { fallY: LAND.y - TIP.y, stretch: 0.35, duration: 0.42, ease: 'power2.in' })
      .to(st, { fallA: 0, duration: 0.12 }, '>-0.04')
      .set(st, { stretch: 0, fallY: 0 })
      // 5) ripple + splash
      .add(() => { splash(); })
      .fromTo(st, { rip: 0, ripA: 0.95 }, { rip: 1, ripA: 0, duration: 1.4, ease: 'power1.out', immediateRender: false })
      .to({}, { duration: 0.5 });
  }
  function start() { gsap.ticker.add(draw); play(); }
})();
</script>
</body>
</html>
