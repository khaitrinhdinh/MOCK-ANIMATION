<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Water Drop — Roll, Fall & Splash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: radial-gradient(800px 500px at 50% 30%, #14101a, #09090e 70%); color: #ededf5;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; min-height: 100vh;
    display: grid; place-items: center; gap: 1rem; padding: 2rem; }
  h1 { font-size: 1.05rem; font-weight: 800; color: #FFBB57; }
  p { font-size: .82rem; color: rgba(237,237,245,.55); max-width: 46ch; text-align: center; }
  .stage { position: relative; width: 340px; height: 460px; border-radius: 20px; overflow: hidden;
    background: #000; border: 1px solid rgba(255,255,255,.08); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
  <h1>💧 Roll → fall → splash</h1>
  <div class="stage"><canvas id="c"></canvas></div>
  <p>A clear water drop (refraction shader + mesh) rolls down the leaf, hangs at the edge, stretches as it falls, and bursts into the splash on impact — droplets fly, ripples spread.</p>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
(function () {
  const stage = document.querySelector('.stage');
  const r = stage.getBoundingClientRect();
  const app = new PIXI.Application({ view: document.getElementById('c'), background: 0x0b0b12,
    antialias: true, autoDensity: true, resolution: Math.min(devicePixelRatio || 1, 2), width: r.width, height: r.height });
  function loadTex(url) { return new Promise((res, rej) => { const im = new Image(); im.onload = () => res(PIXI.Texture.from(im)); im.onerror = rej; im.src = url; }); }

  const vert = `
    attribute vec2 aVertexPosition; attribute vec2 aTextureCoord;
    uniform mat3 projectionMatrix, translationMatrix;
    varying vec2 vUv; varying vec2 vScreen;
    void main(){ vUv = aTextureCoord;
      vec3 p = projectionMatrix * translationMatrix * vec3(aVertexPosition, 1.0);
      gl_Position = vec4(p.xy, 0.0, 1.0);
      vScreen = vec2((p.x+1.0)*0.5, 1.0-(p.y+1.0)*0.5); }`;
  const frag = `
    precision mediump float;
    varying vec2 vUv; varying vec2 vScreen;
    uniform sampler2D uBg; uniform float uTime, uRefract;
    void main(){
      vec2 c = (vUv-0.5)*2.0; float rr = length(c);
      if (rr > 1.0) discard;
      float z = sqrt(max(0.0, 1.0-rr*rr));
      vec3 N = normalize(vec3(c, z));
      vec2 refr = vScreen + N.xy*uRefract*(0.5+0.5*(1.0-z)) - (vScreen-0.5)*0.05*z;
      vec3 bg = texture2D(uBg, refr).rgb;
      float fres = pow(1.0-z, 2.6);
      vec3 L = normalize(vec3(0.45+0.12*sin(uTime*0.6), -0.6, 0.75));
      float spec = pow(max(dot(reflect(-L,N), vec3(0,0,1)),0.0), 60.0);
      float spec2 = pow(max(dot(reflect(-L,N), vec3(0,0,1)),0.0), 12.0);
      vec3 col = bg*(0.92+0.12*z);
      col = mix(col, vec3(0.85,0.93,1.0), fres*0.5);
      col += spec*1.6 + spec2*0.18;
      gl_FragColor = vec4(col, smoothstep(1.0,0.92,rr));
    }`;

  (async () => {
    let bgTex, splashTex;
    try { bgTex = await loadTex('assets/scene3.jpg'); } catch (e) {}
    try { splashTex = await loadTex('assets/splash.png'); } catch (e) {}

    const bg = new PIXI.Sprite(bgTex || PIXI.Texture.WHITE);
    const s = Math.max(r.width / (bg.texture.width || r.width), r.height / (bg.texture.height || r.height));
    bg.scale.set(s); bg.position.set((r.width - bg.width) / 2, (r.height - bg.height) / 2);
    app.stage.addChild(bg);
    const vg = new PIXI.Sprite(makeVignette()); vg.width = r.width; vg.height = r.height; app.stage.addChild(vg);

    const gFX = new PIXI.Graphics(); app.stage.addChild(gFX);   // ripples

    // splash sprite (water burst), anchored at its base
    const splash = new PIXI.Sprite(splashTex || PIXI.Texture.WHITE);
    splash.anchor.set(.5, 1); splash.tint = 0xdfeeff; splash.alpha = 0;
    if (splashTex) splash.width = 236, splash.scale.y = splash.scale.x;   // keep aspect from width
    app.stage.addChild(splash);

    const drops = new PIXI.Graphics(); app.stage.addChild(drops); // flying droplets
    let flyers = [];

    // the water drop (mesh + refraction)
    const SIZE = 140, SEG = 20;
    const geo = new PIXI.PlaneGeometry(SIZE, SEG > 0 ? SIZE : SIZE, SEG, SEG);
    const uniforms = { uBg: bgTex || bg.texture, uTime: 0, uRefract: 0.1 };
    const mesh = new PIXI.Mesh(geo, PIXI.Shader.from(vert, frag, uniforms));
    mesh.pivot.set(SIZE / 2, SIZE / 2);
    app.stage.addChild(mesh);
    const buf = geo.getBuffer('aVertexPosition'), orig = Float32Array.from(buf.data), H = SIZE / 2;

    const st = { sx: 1, sy: 1, tear: 0, wob: 1.0, scale: 0.62 };
    // roll path along the leaf, then straight fall to impact
    const P0 = { x: 120, y: 150 }, P1 = { x: 178, y: 214 }, P2 = { x: 236, y: 286 };
    const IMPACT = { x: 236, y: 402 };
    function bez(t, a, b, c) { const it = 1 - t; return { x: it * it * a.x + 2 * it * t * b.x + t * t * c.x, y: it * it * a.y + 2 * it * t * b.y + t * t * c.y }; }

    app.ticker.add(() => {
      const t = performance.now() / 1000; uniforms.uTime = t;
      const d = buf.data;
      for (let i = 0; i < d.length; i += 2) {
        let ox = orig[i] - H, oy = orig[i + 1] - H;
        const top = Math.max(0, -oy / H);
        let x = ox * (1 - st.tear * top * 0.9);
        let y = oy - st.tear * top * top * 12;
        x += Math.sin(oy * 0.06 + t * 5) * st.wob; y += Math.sin(ox * 0.06 + t * 4.2) * st.wob * 0.6;
        x *= st.sx * st.scale; y *= st.sy * st.scale;
        d[i] = x + H; d[i + 1] = y + H;
      }
      buf.update();
      // droplets physics
      drops.clear();
      for (let i = flyers.length - 1; i >= 0; i--) {
        const f = flyers[i]; f.vy += 340 * 0.016; f.x += f.vx * 0.016; f.y += f.vy * 0.016; f.life -= 0.016;
        if (f.life <= 0 || f.y > IMPACT.y + 4) { flyers.splice(i, 1); continue; }
        drops.beginFill(0xdfeeff, Math.min(1, f.life * 2) * .9); drops.drawCircle(f.x, f.y, f.r); drops.endFill();
      }
    });

    function splashBurst() {
      mesh.alpha = 0;
      splash.position.set(IMPACT.x, IMPACT.y + 6); splash.alpha = 1;
      const bw = 236 / (splashTex ? splashTex.width : 236);
      gsap.timeline().fromTo(splash.scale, { x: bw*.5, y: bw*.3 }, { x: bw*1.06, y: bw*1.06, duration: .32, ease: 'power3.out' }).to(splash.scale, { x: bw, y: bw, duration: .5, ease: 'sine.out' });
      gsap.to(splash, { alpha: 0, duration: .8, delay: 1.7 });
      // flying droplets
      for (let i = 0; i < 16; i++) { const an = -Math.PI / 2 + (Math.random() - .5) * 2.2, v = 90 + Math.random() * 150; flyers.push({ x: IMPACT.x + (Math.random() * 24 - 12), y: IMPACT.y, vx: Math.cos(an) * v, vy: Math.sin(an) * v, r: 1.5 + Math.random() * 2.5, life: .5 + Math.random() * .5 }); }
      // ripple rings
      for (let k = 0; k < 2; k++) { const o = { rad: 6, a: .7 }; gsap.to(o, { rad: 56, a: 0, duration: 1.3, delay: k * .28, ease: 'power1.out',
        onUpdate: () => { drawRings(); }, onComplete: drawRings }); ringObjs.push(o); }
    }
    let ringObjs = [];
    function drawRings() { gFX.clear(); for (const o of ringObjs) { if (o.a <= 0) continue; gFX.lineStyle(1.4, 0xcfe6ff, o.a); gFX.drawEllipse(IMPACT.x, IMPACT.y, o.rad, o.rad * .34); } }

    function play() {
      mesh.alpha = 1; splash.alpha = 0; drops.clear(); gFX.clear(); ringObjs = []; flyers = [];
      Object.assign(st, { sx: 1, sy: 1, tear: 0, wob: 1.0, scale: 0.62 });
      const roll = { u: 0 };
      const tl = gsap.timeline({ onComplete: () => gsap.delayedCall(0.7, play) });
      tl.set(mesh.position, { x: P0.x, y: P0.y });
      // 1) roll down the leaf (accelerating a touch)
      tl.to(roll, { u: 1, duration: 2.0, ease: 'power1.in', onUpdate: () => { const p = bez(roll.u, P0, P1, P2); mesh.position.set(p.x, p.y); } });
      tl.to(st, { wob: 1.6, duration: 1.0 }, 0);
      // 2) hang at the edge + elongate (surface tension)
      tl.to(st, { sy: 1.22, sx: 0.86, tear: 0.45, wob: 1.1, duration: 0.5, ease: 'power2.in' });
      // 3) detach + fall, stretching under gravity
      tl.to(mesh.position, { y: IMPACT.y, duration: 0.5, ease: 'power2.in' });
      tl.to(st, { sy: 1.55, sx: 0.7, tear: 0.7, duration: 0.5, ease: 'power2.in' }, '<');
      // 4) impact -> splash
      tl.add(splashBurst);
      tl.to({}, { duration: 2.2 });   // hold on the settling splash (final image)
    }
    play();

    function makeVignette() { const S = 256, o = document.createElement('canvas'); o.width = o.height = S; const x = o.getContext('2d');
      const g = x.createRadialGradient(S / 2, S / 2, S * 0.34, S / 2, S / 2, S * 0.62); g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.55)'); x.fillStyle = g; x.fillRect(0, 0, S, S); return PIXI.Texture.from(o); }
  })();
})();
</script>
</body>
</html>
