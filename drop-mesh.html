<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Water Drop — Mesh Deform (Level 3)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: radial-gradient(800px 500px at 50% 30%, #14101a, #09090e 70%); color: #ededf5;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; min-height: 100vh;
    display: grid; place-items: center; gap: 1rem; padding: 2rem; }
  h1 { font-size: 1.05rem; font-weight: 800; color: #FFBB57; }
  p { font-size: .82rem; color: rgba(237,237,245,.55); max-width: 42ch; text-align: center; }
  .stage { position: relative; width: 320px; height: 400px; border-radius: 20px; overflow: hidden;
    background: #0b0b12; border: 1px solid rgba(255,255,255,.08); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
  <h1>💧 Mesh Deform — one drop, real water</h1>
  <div class="stage"><canvas id="c"></canvas></div>
  <p>A single procedural drop texture on a Pixi mesh; its vertices are displaced every frame — surface-tension wobble + a squash → teardrop → squash morph cycle. No sprite frames.</p>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
(function () {
  const stage = document.querySelector('.stage');

  // ---- procedural glossy gold drop texture (clean, so nothing mismatches) ----
  function dropTexture() {
    const S = 256, o = document.createElement('canvas'); o.width = o.height = S;
    const x = o.getContext('2d'), cx = S / 2, cy = S / 2, R = S * 0.4;
    const g = x.createRadialGradient(cx - R * .3, cy - R * .4, R * .1, cx, cy, R);
    g.addColorStop(0, '#fff6df'); g.addColorStop(.35, '#FFBB57'); g.addColorStop(.8, '#F58F22'); g.addColorStop(1, '#b96e12');
    x.fillStyle = g; x.beginPath(); x.arc(cx, cy, R, 0, 6.28); x.fill();
    // rim shade
    x.globalCompositeOperation = 'multiply';
    const r2 = x.createRadialGradient(cx, cy, R * .6, cx, cy, R);
    r2.addColorStop(0, 'rgba(255,255,255,1)'); r2.addColorStop(1, 'rgba(150,90,20,1)');
    x.fillStyle = r2; x.beginPath(); x.arc(cx, cy, R, 0, 6.28); x.fill();
    x.globalCompositeOperation = 'source-over';
    // specular highlight
    x.fillStyle = 'rgba(255,255,255,.85)'; x.beginPath(); x.ellipse(cx - R * .32, cy - R * .38, R * .18, R * .12, -0.5, 0, 6.28); x.fill();
    x.fillStyle = 'rgba(255,255,255,.35)'; x.beginPath(); x.arc(cx + R * .25, cy + R * .3, R * .1, 0, 6.28); x.fill();
    return PIXI.Texture.from(o);
  }

  const r = stage.getBoundingClientRect();
  const app = new PIXI.Application({ view: document.getElementById('c'), backgroundAlpha: 0, antialias: true,
    autoDensity: true, resolution: Math.min(devicePixelRatio || 1, 2), width: r.width, height: r.height });

  if (PIXI.filters.AdvancedBloomFilter) app.stage.filters = [new PIXI.filters.AdvancedBloomFilter({ threshold: .6, bloomScale: .35, blur: 4, quality: 4 })];

  const SIZE = 150, SEG = 18;
  const geo = new PIXI.PlaneGeometry(SIZE, SIZE, SEG, SEG);
  const mesh = new PIXI.Mesh(geo, new PIXI.MeshMaterial(dropTexture()));
  mesh.pivot.set(SIZE / 2, SIZE / 2);
  mesh.position.set(r.width / 2, r.height * 0.46);
  app.stage.addChild(mesh);

  // soft shadow / ripple under the drop
  const gShadow = new PIXI.Graphics(); app.stage.addChildAt(gShadow, 0);

  const buf = geo.getBuffer('aVertexPosition');
  const orig = Float32Array.from(buf.data);
  const H = SIZE / 2;

  // morph state driven by a GSAP timeline (○ → ⬭ → 💧 → ⬯ → ○)
  const st = { sx: 1, sy: 1, tear: 0, wob: 1.2, bob: 0 };
  const tl = gsap.timeline({ repeat: -1 });
  tl.to(st, { sx: 1.22, sy: 0.82, tear: 0, wob: 2.4, duration: 0.5, ease: 'power2.out' })   // squash wide (impact-ish)
    .to(st, { sx: 0.82, sy: 1.28, tear: 0.55, wob: 1.6, duration: 0.6, ease: 'power2.inOut' }) // stretch into teardrop
    .to(st, { sx: 1.05, sy: 0.96, tear: 0.12, wob: 2.0, duration: 0.45, ease: 'power2.out' })  // settle overshoot
    .to(st, { sx: 1, sy: 1, tear: 0, wob: 1.2, duration: 0.8, ease: 'elastic.out(1,.5)' })     // round + jelly settle
    .to(st, { duration: 0.7 });                                                                // idle wobble
  gsap.to(st, { bob: 1, duration: 2.2, repeat: -1, yoyo: true, ease: 'sine.inOut' });

  app.ticker.add(() => {
    const t = performance.now() / 1000;
    const d = buf.data;
    for (let i = 0; i < d.length; i += 2) {
      let ox = orig[i] - H, oy = orig[i + 1] - H;   // centered coords
      // teardrop: taper the TOP toward a point
      const top = Math.max(0, -oy / H);             // 0 center → 1 top
      let x = ox * (1 - st.tear * top * 0.95);
      let y = oy - st.tear * top * top * 12;        // pull the tip up a bit
      // surface-tension jelly wobble
      x += Math.sin(oy * 0.06 + t * 5.0) * st.wob;
      y += Math.sin(ox * 0.06 + t * 4.2) * st.wob * 0.6;
      // squash / stretch
      x *= st.sx; y *= st.sy;
      d[i] = x + H; d[i + 1] = y + H;
    }
    buf.update();
    mesh.y = r.height * 0.46 + st.bob * 6;

    // shadow follows the squash (wider when squashed)
    gShadow.clear();
    gShadow.beginFill(0x000000, .35);
    gShadow.drawEllipse(r.width / 2, r.height * 0.46 + 78, 46 * st.sx, 9 / st.sy);
    gShadow.endFill();
    gShadow.beginFill(0xF58F22, .12);
    gShadow.drawEllipse(r.width / 2, r.height * 0.46 + 78, 40 * st.sx, 7 / st.sy);
    gShadow.endFill();
  });
})();
</script>
</body>
</html>
